<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f1419" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wand-m2" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <title>Wand-m2</title>
    <script type="module" crossorigin src="/wand-m2/assets/index-BMK21Kxv.js"></script>
    <link rel="stylesheet" crossorigin href="/wand-m2/assets/index-D6zireu_.css">
  </head>
  <body>
    <div id="app">
      <header class="hud">
        <div class="hud-left">
          <strong class="logo" id="logo">Wand-m2</strong>
          <span id="status" class="status"></span>
        </div>
        <div class="hud-right">
          <div id="lang-picker" class="lang-picker" role="group" aria-label="Language"></div>

          <div class="tool-group" title="Maten">
            <label class="scale length-field" id="length-field">
              <span id="label-wall"></span>
              <input
                id="wall-length"
                type="number"
                min="0.01"
                step="0.01"
                inputmode="decimal"
                placeholder="—"
                disabled
              />
            </label>
            <label class="scale angle-field" id="angle-field">
              <span id="label-angle"></span>
              <input
                id="corner-angle"
                type="number"
                min="1"
                max="359"
                step="0.1"
                inputmode="decimal"
                placeholder="—"
                disabled
              />
            </label>
            <button type="button" id="snap-angle" class="btn" disabled></button>
          </div>

          <div class="tool-group" title="Deuren">
            <button type="button" id="add-door" class="btn" disabled></button>
            <label class="scale door-field" id="door-field">
              <span id="label-door"></span>
              <input
                id="door-width"
                type="number"
                min="0.3"
                step="0.05"
                inputmode="decimal"
                placeholder="—"
                disabled
              />
            </label>
            <button type="button" id="remove-door" class="btn btn-danger" disabled></button>
            <button type="button" id="door-hinge-l" class="btn" disabled title="Scharnier links">L</button>
            <button type="button" id="door-hinge-r" class="btn" disabled title="Scharnier rechts">R</button>
            <button type="button" id="door-swing" class="btn" disabled title="Draairichting omdraaien">↺</button>
          </div>

          <div class="tool-group tool-group-primary" title="Kamers & scheiding">
            <label class="room-type-field" id="room-type-field">
              <span id="label-room-type">Type</span>
              <select id="room-type"></select>
            </label>
            <label class="room-name-field" id="room-name-field">
              <span id="label-room-name">Ruimte</span>
              <input
                id="room-name"
                type="text"
                list="room-name-presets"
                placeholder="bijv. Slaapkamer"
                disabled
                autocomplete="off"
              />
              <datalist id="room-name-presets"></datalist>
            </label>
            <button type="button" id="partition-draw" class="btn btn-primary" disabled title="Vrije scheidingswand: muur → hoeken → muur">
              ✂ Scheiding
            </button>
            <button type="button" id="remove-partition" class="btn btn-danger" disabled title="Scheidingswand weg → 1 ruimte">
              Scheiding weg
            </button>
            <button type="button" id="split-loop" class="btn" disabled title="Gelijke banen ÷2/÷3/÷4"></button>
          </div>

          <div class="tool-group" title="Weergave">
            <button type="button" id="zoom-out" class="btn" title="Zoom uit">−</button>
            <button type="button" id="zoom-reset" class="btn" title="Passend / 100%">Fit</button>
            <button type="button" id="zoom-in" class="btn" title="Zoom in">+</button>
            <label class="scale">
              <span id="label-ppm"></span>
              <input id="px-per-m" type="number" min="5" max="2000" step="1" value="50" inputmode="numeric" />
            </label>
          </div>

          <div class="tool-group">
            <button type="button" id="undo" class="btn"></button>
            <button type="button" id="reset" class="btn btn-danger"></button>
          </div>
        </div>
      </header>
      <main class="stage">
        <canvas id="canvas"></canvas>
        <div id="area-badge" class="area-badge hidden" aria-live="polite"></div>

        <div
          id="angle-popup"
          class="popup popup-meetfout hidden"
          role="dialog"
          aria-modal="true"
          aria-labelledby="angle-popup-title"
        >
          <div class="popup-card">
            <div class="popup-drag-handle" id="popup-drag-handle">
              <span class="popup-drag-grip" aria-hidden="true">::</span>
              <p class="popup-kicker" id="popup-kicker"></p>
            </div>
            <div class="popup-body">
              <h2 id="angle-popup-title"></h2>
              <p id="angle-popup-lead" class="popup-lead"></p>
              <div id="popup-odd-list" class="popup-odd-list"></div>
              <div id="popup-main-actions" class="popup-actions">
                <button type="button" id="angle-ignore" class="btn"></button>
                <button type="button" id="angle-confirm" class="btn btn-primary"></button>
                <button type="button" id="angle-relocate" class="btn btn-warn"></button>
              </div>
              <div id="popup-relocate-panel" class="popup-relocate hidden">
                <p class="popup-hint" id="popup-relocate-hint"></p>
                <div id="popup-corner-picks" class="popup-corner-picks"></div>
                <div class="popup-actions">
                  <button type="button" id="angle-relocate-cancel" class="btn"></button>
                  <button type="button" id="angle-relocate-apply" class="btn btn-warn" disabled></button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div
          id="split-popup"
          class="popup popup-meetfout hidden"
          role="dialog"
          aria-modal="true"
          aria-labelledby="split-popup-title"
        >
          <div class="popup-card">
            <div class="popup-drag-handle" id="split-drag-handle">
              <span class="popup-drag-grip" aria-hidden="true">::</span>
              <p class="popup-kicker" id="split-kicker"></p>
            </div>
            <div class="popup-body">
              <h2 id="split-popup-title"></h2>
              <p id="split-popup-lead" class="popup-lead"></p>
              <div id="split-option-picks" class="popup-corner-picks"></div>
              <div class="popup-actions">
                <button type="button" id="split-cancel" class="btn"></button>
                <button type="button" id="split-apply" class="btn btn-primary" disabled></button>
              </div>
            </div>
          </div>
        </div>
      </main>
      <p class="hint" id="footer-hint"></p>
    </div>
  </body>
</html>
