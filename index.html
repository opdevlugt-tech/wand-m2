<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f1419" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wand-m2" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <title>Wand-m2</title>
  </head>
  <body>
    <div id="app">
      <header class="hud">
        <!-- Rij 1: identiteit + status + bestand -->
        <div class="hud-row hud-row-main">
          <div class="hud-brand">
            <strong class="logo" id="logo">Wand-m²</strong>
            <span id="status" class="status"></span>
          </div>
          <div class="hud-file">
            <div id="lang-picker" class="lang-picker" role="group" aria-label="Language"></div>
            <button type="button" id="undo" class="btn" title="Ongedaan (Ctrl+Z)">↩</button>
            <button type="button" id="save" class="btn btn-primary" title="Opslaan als JSON">Opslaan</button>
            <button type="button" id="load" class="btn" title="Laden uit JSON">Laden</button>
            <input id="load-file" type="file" accept="application/json,.json" class="hidden" />
            <button type="button" id="reset" class="btn btn-danger" title="Alles wissen">Reset</button>
          </div>
        </div>

        <!-- Rij 2: workflow-tools met labels -->
        <div class="hud-row hud-row-tools">
          <div class="tool-group" data-step="1">
            <span class="tool-label">Muur</span>
            <label class="scale length-field" id="length-field">
              <span id="label-wall">m</span>
              <input
                id="wall-length"
                type="number"
                min="0.01"
                step="0.01"
                inputmode="decimal"
                placeholder="—"
                disabled
                title="Lengte geselecteerde muur"
              />
            </label>
            <label class="scale angle-field" id="angle-field">
              <span id="label-angle">°</span>
              <input
                id="corner-angle"
                type="number"
                min="1"
                max="359"
                step="0.1"
                inputmode="decimal"
                placeholder="—"
                disabled
                title="Binnenhoek geselecteerde hoek"
              />
            </label>
            <button type="button" id="snap-angle" class="btn" disabled title="Hoek naar 45/90/135">45°</button>
          </div>

          <div class="tool-group" data-step="2">
            <span class="tool-label">Deur</span>
            <button type="button" id="add-door" class="btn" disabled title="Deur op geselecteerde muur">+ Deur</button>
            <label class="scale door-field" id="door-field">
              <span id="label-door">m</span>
              <input
                id="door-width"
                type="number"
                min="0.3"
                step="0.05"
                inputmode="decimal"
                placeholder="—"
                disabled
                title="Deurbreedte"
              />
            </label>
            <button type="button" id="door-hinge-l" class="btn" disabled title="Scharnier links">L</button>
            <button type="button" id="door-hinge-r" class="btn" disabled title="Scharnier rechts">R</button>
            <button type="button" id="door-swing" class="btn" disabled title="Draairichting">↺</button>
            <button type="button" id="remove-door" class="btn btn-danger" disabled title="Deur weg">×</button>
          </div>

          <div class="tool-group tool-group-primary" data-step="3">
            <span class="tool-label">Kamer</span>
            <label class="room-type-field" id="room-type-field" title="Type / eisen">
              <select id="room-type" disabled></select>
            </label>
            <label class="room-name-field" id="room-name-field" title="Ruimtenaam">
              <input
                id="room-name"
                type="text"
                list="room-name-presets"
                placeholder="Naam…"
                disabled
                autocomplete="off"
              />
              <datalist id="room-name-presets"></datalist>
            </label>
            <button
              type="button"
              id="partition-draw"
              class="btn btn-primary"
              disabled
              title="Scheidingswand: klik muur → sleep naar andere muur"
            >
              ✂ Scheiding
            </button>
            <button
              type="button"
              id="split-loop"
              class="btn"
              disabled
              title="Gelijke banen ÷2 / ÷3 / ÷4"
            >
              Deel…
            </button>
            <button
              type="button"
              id="remove-partition"
              class="btn btn-danger"
              disabled
              title="Scheidingswand weg → 1 ruimte"
            >
              Weg
            </button>
          </div>

          <div class="tool-group tool-group-view" data-step="z">
            <span class="tool-label">Zoom</span>
            <button type="button" id="zoom-out" class="btn" title="Uit">−</button>
            <button type="button" id="zoom-reset" class="btn" title="Passend">Fit</button>
            <button type="button" id="zoom-in" class="btn" title="In">+</button>
            <label class="scale scale-ppm" title="Pixels per meter">
              <span id="label-ppm">px/m</span>
              <input id="px-per-m" type="number" min="5" max="2000" step="1" value="50" inputmode="numeric" />
            </label>
          </div>
        </div>
      </header>

      <main class="stage">
        <canvas id="canvas"></canvas>
        <div id="area-badge" class="area-badge hidden" aria-live="polite"></div>

        <div
          id="angle-popup"
          class="popup popup-meetfout hidden"
          role="dialog"
          aria-modal="true"
          aria-labelledby="angle-popup-title"
        >
          <div class="popup-card">
            <div class="popup-drag-handle" id="popup-drag-handle">
              <span class="popup-drag-grip" aria-hidden="true">::</span>
              <p class="popup-kicker" id="popup-kicker"></p>
            </div>
            <div class="popup-body">
              <h2 id="angle-popup-title"></h2>
              <p id="angle-popup-lead" class="popup-lead"></p>
              <div id="popup-odd-list" class="popup-odd-list"></div>
              <div id="popup-main-actions" class="popup-actions">
                <button type="button" id="angle-ignore" class="btn"></button>
                <button type="button" id="angle-confirm" class="btn btn-primary"></button>
                <button type="button" id="angle-relocate" class="btn btn-warn"></button>
              </div>
              <div id="popup-relocate-panel" class="popup-relocate hidden">
                <p class="popup-hint" id="popup-relocate-hint"></p>
                <div id="popup-corner-picks" class="popup-corner-picks"></div>
                <div class="popup-actions">
                  <button type="button" id="angle-relocate-cancel" class="btn"></button>
                  <button type="button" id="angle-relocate-apply" class="btn btn-warn" disabled></button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div
          id="split-popup"
          class="popup popup-meetfout hidden"
          role="dialog"
          aria-modal="true"
          aria-labelledby="split-popup-title"
        >
          <div class="popup-card">
            <div class="popup-drag-handle" id="split-drag-handle">
              <span class="popup-drag-grip" aria-hidden="true">::</span>
              <p class="popup-kicker" id="split-kicker"></p>
            </div>
            <div class="popup-body">
              <h2 id="split-popup-title"></h2>
              <p id="split-popup-lead" class="popup-lead"></p>
              <div id="split-option-picks" class="popup-corner-picks"></div>
              <div class="popup-actions">
                <button type="button" id="split-cancel" class="btn"></button>
                <button type="button" id="split-apply" class="btn btn-primary" disabled></button>
              </div>
            </div>
          </div>
        </div>
      </main>
      <p class="hint" id="footer-hint"></p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
